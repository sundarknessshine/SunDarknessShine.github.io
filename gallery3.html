<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery – SunDarknessShine</title>

<style>
/* СТИЛЬ НЕ МЕНЯЕМ */
body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:#000 url("background2.jpg") no-repeat center center fixed;
  background-size:cover;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  overflow-x:hidden;
}

.lang-switch{
  position:fixed;
  top:1.5rem;
  right:1.5rem;
  display:flex;
  gap:.5rem;
  z-index:50;
}
.lang-switch button{
  background:rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,.7);
  color:#fff;
  border-radius:6px;
  padding:.3rem .7rem;
  cursor:pointer;
}

h1{
  margin:2.6rem 0 1.5rem;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#7A2E8E;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
  width:min(1200px, 92vw);
  margin-bottom:2rem;
}

.grid-item{
  cursor:pointer;
  border-radius:10px;
  overflow:hidden;
  aspect-ratio:1/1;
}
.grid-item img, .grid-item video{
  width:100%;
  height:100%;
  object-fit:cover;
  pointer-events:none;
}

.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.lightbox.active{display:flex;}

.lightbox img, .lightbox video{
  max-width:92vw;
  max-height:82vh;
}

.close-btn,.prev-btn,.next-btn{
  position:absolute;
  font-size:2rem;
  color:#fff;
  cursor:pointer;
}
.close-btn{top:20px; right:20px;}
.prev-btn{left:20px; top:50%;}
.next-btn{right:20px; top:50%;}
</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="location.href='gallery3_ru.html'">RU</button>
  <button onclick="location.href='gallery3_jp.html'">JP</button>
</div>

<h1>Gallery</h1>

<div class="grid" id="galleryGrid"></div>

<div class="nav-links">
  <a href="index3.html">Back</a>
  <a href="about3.html">Information</a>
  <a href="contact.html">Contacts</a>
</div>

<div class="lightbox" id="lightbox">
  <span class="close-btn" id="closeBtn">×</span>
  <span class="prev-btn" id="prevBtn">❮</span>
  <span class="next-btn" id="nextBtn">❯</span>
  <div id="lightbox-content"></div>
</div>

<script>
const grid = document.getElementById("galleryGrid");
const lightbox = document.getElementById("lightbox");
const content = document.getElementById("lightbox-content");

const items=[];
let current=0;

function num(i){ return "00"+String(i); }

function add(type,src){
  const i=items.length;
  const div=document.createElement("div");
  div.className="grid-item";
  div.dataset.type=type;
  div.dataset.src=src;

  const el=document.createElement(type==="image"?"img":"video");
  el.src=src;
  div.appendChild(el);

  div.onclick=()=>open(i);
  grid.appendChild(div);
  items.push(div);
}

function open(i){
  current=i;
  content.innerHTML="";
  const item=items[i];

  if(item.dataset.type==="image"){
    const img=new Image();
    img.src=item.dataset.src;
    content.appendChild(img);
  }else{
    const v=document.createElement("video");
    v.src=item.dataset.src;
    v.controls=true;
    v.autoplay=true;
    content.appendChild(v);
  }

  lightbox.classList.add("active");
}

function close(){lightbox.classList.remove("active");}
function nav(d){open((current+d+items.length)%items.length);}

closeBtn.onclick=close;
prevBtn.onclick=()=>nav(-1);
nextBtn.onclick=()=>nav(1);

for(let i=1;i<=999;i++){
  const n=num(i);

  const img=new Image();
  img.onload=()=>add("image",`${n}.jpg`);
  img.src=`${n}.jpg`;

  const v=document.createElement("video");
  v.onloadedmetadata=()=>add("video",`${n}.mp4`);
  v.src=`${n}.mp4`;
}
</script>

</body>
</html>
