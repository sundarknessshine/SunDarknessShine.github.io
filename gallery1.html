<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery – SunDarknessShine</title>

<style>
  body{
    margin:0;
    font-family:"Segoe UI",sans-serif;
    background:#000 url("background2.jpg") no-repeat center center fixed;
    background-size:cover;
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    overflow-x:hidden;
  }

  .lang-switch{
    position:fixed;
    top:1.5rem;
    right:1.5rem;
    display:flex;
    gap:.5rem;
    z-index:50;
  }
  .lang-switch button{
    background:rgba(0,0,0,.6);
    border:1px solid rgba(255,255,255,.7);
    color:#fff;
    border-radius:6px;
    padding:.3rem .7rem;
    cursor:pointer;
  }

  h1{
    margin:2.6rem 0 1.5rem;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#7A2E8E;
    text-shadow:
      -2px -2px 0 #000,
       2px -2px 0 #000,
      -2px  2px 0 #000,
       2px  2px 0 #000,
       0 0 25px rgba(122,46,142,.7);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
    width:min(1200px, 92vw);
    margin-bottom:2rem;
  }

  .grid-item{
    cursor:pointer;
    overflow:hidden;
    border-radius:10px;
    background:rgba(0,0,0,.25);
    aspect-ratio:1/1;
  }

  .grid-item img,
  .grid-item video{
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
  }

  .nav-links{
    margin:1.2rem 0 2.5rem;
    display:flex;
    gap:.7rem;
  }

  .nav-links a{
    color:#FF3EFF;
    text-decoration:none;
    border:1px solid rgba(255,62,255,.6);
    padding:.5rem 1rem;
    border-radius:8px;
  }

  .lightbox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.92);
    display:none;
    justify-content:center;
    align-items:center;
  }
  .lightbox.active{display:flex;}

  .lightbox img,
  .lightbox video{
    max-width:90vw;
    max-height:80vh;
  }

  .close-btn,.prev-btn,.next-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:2rem;
    color:#fff;
    cursor:pointer;
  }

  .close-btn{
    top:20px;
    right:20px;
    transform:none;
  }
  .prev-btn{left:20px;}
  .next-btn{right:20px;}
</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="location.href='gallery1_ru.html'">RU</button>
  <button onclick="location.href='gallery1_jp.html'">JP</button>
</div>

<h1>Gallery</h1>

<div class="grid" id="galleryGrid"></div>

<div class="nav-links">
  <a href="index1.html">Home</a>
  <a href="about1.html">Information</a>
  <a href="contact.html">Contacts</a>
</div>

<div class="lightbox" id="lightbox">
  <span class="close-btn" id="closeBtn">×</span>
  <span class="prev-btn" id="prevBtn">❮</span>
  <span class="next-btn" id="nextBtn">❯</span>
  <div id="lightbox-content"></div>
</div>

<script>
const grid=document.getElementById("galleryGrid");
const lightbox=document.getElementById("lightbox");
const content=document.getElementById("lightbox-content");

const closeBtn=document.getElementById("closeBtn");
const prevBtn=document.getElementById("prevBtn");
const nextBtn=document.getElementById("nextBtn");

const items=[];
let current=0;

function num(i){ return String(i); }

function addMedia(type,src){
  const index=items.length;

  const div=document.createElement("div");
  div.className="grid-item";
  div.dataset.type=type;
  div.dataset.src=src;

  let el;
  if(type==="image"){
    el=document.createElement("img");
    el.src=src;
  }else{
    el=document.createElement("video");
    el.src=src;
    el.muted=true;
    el.playsInline=true;
    el.preload="metadata";
  }

  div.appendChild(el);
  div.onclick=()=>open(index);

  grid.appendChild(div);
  items.push(div);
}

function open(index){
  current=index;
  const item=items[index];

  content.innerHTML="";

  if(item.dataset.type==="image"){
    const img=document.createElement("img");
    img.src=item.dataset.src;
    content.appendChild(img);
  }else{
    const v=document.createElement("video");
    v.src=item.dataset.src;
    v.controls=true;
    v.autoplay=true;
    content.appendChild(v);
  }

  lightbox.classList.add("active");
}

function close(){
  lightbox.classList.remove("active");
  content.innerHTML="";
}

function nav(dir){
  current=(current+dir+items.length)%items.length;
  open(current);
}

closeBtn.onclick=close;
nextBtn.onclick=()=>nav(1);
prevBtn.onclick=()=>nav(-1);

lightbox.onclick=e=>{
  if(e.target===lightbox) close();
};

for(let i=1;i<=999;i++){
  const n=num(i);

  const img=new Image();
  img.onload=()=>addMedia("image",`${n}.jpg`);
  img.src=`${n}.jpg`;

  const v=document.createElement("video");
  v.onloadedmetadata=()=>addMedia("video",`${n}.mp4`);
  v.src=`${n}.mp4`;
}
</script>

</body>
</html>
