<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Галерея – SunDarknessShine</title>

<style>
  body{
    margin:0;
    font-family:"Segoe UI",sans-serif;
    background:#000 url("background2.jpg") no-repeat center center fixed;
    background-size:cover;
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    overflow-x:hidden;
  }

  .lang-switch{
    position:fixed;
    top:1.5rem;
    right:1.5rem;
    display:flex;
    gap:.5rem;
    z-index:50;
  }

  h1{
    margin:2.6rem 0 1.5rem;
    text-transform:uppercase;
    color:#7A2E8E;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    width:min(1200px,92vw);
  }

  .grid-item{
    aspect-ratio:1/1;
    overflow:hidden;
    border-radius:10px;
    cursor:pointer;
  }

  .grid-item img,
  .grid-item video{
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
  }

  .lightbox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.92);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
  }
  .lightbox.active{display:flex;}

  .lightbox-inner{
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
  }

  .lightbox img,
  .lightbox video{
    max-width:90vw;
    max-height:80vh;
  }

  .close-btn,.prev-btn,.next-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:2rem;
    color:#fff;
    cursor:pointer;
  }

  .close-btn{
    top:20px;
    right:20px;
    transform:none;
  }
  .prev-btn{left:20px;}
  .next-btn{right:20px;}
</style>
</head>

<body>

<h1>Галерея</h1>
<div class="grid" id="galleryGrid"></div>

<div class="lightbox" id="lightbox">
  <span class="close-btn" id="closeBtn">×</span>
  <span class="prev-btn" id="prevBtn">❮</span>
  <span class="next-btn" id="nextBtn">❯</span>
  <div class="lightbox-inner" id="lightbox-content"></div>
</div>

<script>
const grid = document.getElementById("galleryGrid");
const lightbox = document.getElementById("lightbox");
const lightboxContent = document.getElementById("lightbox-content");

const closeBtn = document.getElementById("closeBtn");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

const items = [];
let current = 0;

function num(i){ return i; }

function addMedia(type, src){
  const index = items.length;

  const item = document.createElement("div");
  item.className = "grid-item";
  item.dataset.type = type;
  item.dataset.src = src;

  let el = document.createElement(type==="image"?"img":"video");
  el.src = src;

  if(type==="video"){
    el.muted = true;
    el.preload = "metadata";
  }

  item.appendChild(el);
  item.addEventListener("click", () => openLightbox(index));

  grid.appendChild(item);
  items.push(item);
}

function openLightbox(index){
  current = index;
  const item = items[index];

  lightboxContent.innerHTML="";

  const el = document.createElement(item.dataset.type==="image"?"img":"video");
  el.src = item.dataset.src;

  if(item.dataset.type==="video"){
    el.controls = true;
    el.autoplay = true;
  }

  lightboxContent.appendChild(el);
  lightbox.classList.add("active");
}

function closeLightbox(){
  lightbox.classList.remove("active");
  lightboxContent.innerHTML="";
}

function nav(dir){
  if(!items.length) return;
  current = (current + dir + items.length) % items.length;
  openLightbox(current);
}

/* ✅ ВОЗВРАЩАЕМ ВСЕ ОБРАБОТЧИКИ */
closeBtn.addEventListener("click", closeLightbox);
nextBtn.addEventListener("click", () => nav(1));
prevBtn.addEventListener("click", () => nav(-1));

lightbox.addEventListener("click", (e)=>{
  if(e.target===lightbox) closeLightbox();
});

document.addEventListener("keydown", (e)=>{
  if(!lightbox.classList.contains("active")) return;
  if(e.key==="Escape") closeLightbox();
  if(e.key==="ArrowRight") nav(1);
  if(e.key==="ArrowLeft") nav(-1);
});

/* загрузка */
for(let i=1;i<=999;i++){
  const n=num(i);

  const img=new Image();
  img.onload=()=>addMedia("image",`${n}.jpg`);
  img.src=`${n}.jpg`;

  const v=document.createElement("video");
  v.onloadedmetadata=()=>addMedia("video",`${n}.mp4`);
  v.src=`${n}.mp4`;
}
</script>

</body>
</html>
