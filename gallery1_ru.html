<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Галерея – SunDarknessShine</title>

<style>
  body{
    margin:0;
    font-family:"Segoe UI",sans-serif;
    background:#000 url("background2.jpg") no-repeat center center fixed;
    background-size:cover;
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    overflow-x:hidden;
  }

  .lang-switch{
    position:fixed;
    top:1.5rem;
    right:1.5rem;
    display:flex;
    gap:.5rem;
    z-index:50;
  }
  .lang-switch button{
    background:rgba(0,0,0,.6);
    border:1px solid rgba(255,255,255,.7);
    color:#fff;
    border-radius:6px;
    padding:.3rem .7rem;
    cursor:pointer;
  }

  h1{
    margin:2.6rem 0 1.5rem;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#7A2E8E;
    text-shadow:
      -2px -2px 0 #000,
       2px -2px 0 #000,
      -2px  2px 0 #000,
       2px  2px 0 #000,
       0 0 25px rgba(122,46,142,.7);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
    width:min(1200px, 92vw);
    margin-bottom:2rem;
    padding:0 0 1rem;
  }

  .grid-item{
    cursor:pointer;
    position:relative;
    overflow:hidden;
    border-radius:10px;
    background:rgba(0,0,0,.25);
    aspect-ratio: 1 / 1;
  }

  .grid-item img,
  .grid-item video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:transform .3s ease;
    pointer-events:none;
  }
  .grid-item:hover img,
  .grid-item:hover video{
    transform:scale(1.05);
  }

  .nav-links{
    margin:1.2rem 0 2.5rem;
    display:flex;
    gap:.7rem;
    flex-wrap:wrap;
    justify-content:center;
  }
  .nav-links a{
    color:#FF3EFF;
    text-decoration:none;
    border:1px solid rgba(255,62,255,.6);
    padding:.5rem 1rem;
    border-radius:8px;
  }

  .lightbox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.92);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
    padding:1rem;
  }
  .lightbox.active{ display:flex; }

  .lightbox-inner{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .lightbox img,
  .lightbox video{
    max-width:min(1100px, 92vw);
    max-height:82vh;
    border-radius:12px;
  }

  .close-btn,.prev-btn,.next-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:2rem;
    color:#fff;
    cursor:pointer;
    background:rgba(0,0,0,.45);
    border-radius:999px;
    padding:10px 14px;
  }
  .close-btn{
    top:1.4rem;
    right:1.4rem;
    transform:none;
  }
  .prev-btn{ left:1.2rem; }
  .next-btn{ right:1.2rem; }
</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="location.href='gallery1.html'">EN</button>
  <button onclick="location.href='gallery1_jp.html'">JP</button>
</div>

<h1>Галерея</h1>

<div class="grid" id="galleryGrid"></div>

<div class="nav-links">
  <a href="index1_ru.html">Главная</a>
  <a href="about1_ru.html">Информация</a>
  <a href="contact_ru.html">Контакты</a>
</div>

<div class="lightbox" id="lightbox">
  <span class="close-btn" id="closeBtn">×</span>
  <span class="prev-btn" id="prevBtn">❮</span>
  <span class="next-btn" id="nextBtn">❯</span>
  <div class="lightbox-inner" id="lightbox-content"></div>
</div>

<script>
const grid = document.getElementById("galleryGrid");
const lightbox = document.getElementById("lightbox");
const lightboxContent = document.getElementById("lightbox-content");

const items = [];
let current = 0;

/* 🔥 НАТУРАЛЬНЫЕ ЧИСЛА */
function num(i){ return i; }

/* дальше ВСЁ БЕЗ ИЗМЕНЕНИЙ */
function addMedia(type, src){
  const index = items.length;
  const item = document.createElement("div");
  item.className = "grid-item";
  item.dataset.type = type;
  item.dataset.src = src;

  let el = document.createElement(type === "image" ? "img" : "video");
  el.src = src;

  if(type==="video"){
    el.muted=true;
    el.preload="metadata";
  }

  item.appendChild(el);
  item.addEventListener("click", () => openLightbox(index));
  grid.appendChild(item);
  items.push(item);
}

function openLightbox(index){
  current = index;
  const item = items[index];

  lightboxContent.innerHTML="";
  const el = document.createElement(item.dataset.type==="image"?"img":"video");
  el.src=item.dataset.src;

  if(item.dataset.type==="video"){
    el.controls=true;
    el.autoplay=true;
  }

  lightboxContent.appendChild(el);
  lightbox.classList.add("active");
}

lightbox.onclick=e=>{
  if(e.target===lightbox){
    lightbox.classList.remove("active");
    lightboxContent.innerHTML="";
  }
};

for(let i=1;i<=999;i++){
  const n=num(i);

  const img=new Image();
  img.onload=()=>addMedia("image",`${n}.jpg`);
  img.src=`${n}.jpg`;

  const v=document.createElement("video");
  v.onloadedmetadata=()=>addMedia("video",`${n}.mp4`);
  v.src=`${n}.mp4`;
}
</script>

</body>
</html>
