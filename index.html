<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunDarknessShine</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000 url("background.jpg") no-repeat center center fixed;
  background-size:cover;
  min-height:100vh;
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  position:relative;
  padding-bottom:8vh;
  overflow-x:hidden;
}

/* Верхний слоган — опущен ниже кнопок */
.top-tagline {
  position:absolute;
  top:5.5rem; /* Сместили ниже */
  left:50%;
  transform:translateX(-50%);
  width:min(1200px, calc(100% - 100px)); 
  padding:0 1.5rem;
  text-align:center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size:2.2rem; /* Увеличено в 2 раза */
  line-height:1.3;
  color:#D8B4E8;
  text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0 0 30px rgba(216, 180, 232, 0.7);
  z-index:2;
}

/* Переключатель языков — меньше и в самом углу */
.lang-switch {
  position:absolute;
  top:0.8rem;
  right:0.8rem;
  display:flex;
  gap:.3rem;
  z-index:3;
}

.lang-switch button {
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,0.3);
  color:#ccc;
  border-radius:4px;
  padding:.2rem .4rem;
  cursor:pointer;
  font-size:.75rem; /* Маленький размер */
  transition:.25s;
}
.lang-switch button:hover { background:rgba(255,255,255,.2); color:#fff; }

.content { text-align:center; z-index:1; padding:1rem; width:100%; }

.avatar-wrapper {
  width:220px;
  height:220px;
  margin:0 auto 2rem;
}
.avatar-wrapper img {
  width:100%; height:100%; object-fit:cover; border-radius:50%;
  border:5px solid #7A2E8E;
  box-shadow:0 0 30px rgba(0,0,0,.9), 0 0 40px rgba(122,46,142,0.6);
}

/* Гигантский заголовок для Desktop */
h1 {
  font-family: 'Cinzel', serif;
  font-size:7.5rem; /* Увеличено более чем в 2 раза */
  color:#E2C275;
  text-shadow: -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000, 0 0 50px rgba(226, 194, 117, 0.6);
  margin-bottom:0.5rem;
  letter-spacing: 4px;
  line-height: 1;
}

.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size:3.2rem; /* Увеличено в 2 раза */
  letter-spacing:2px;
  color:#D8B4E8;
  text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0 0 30px rgba(216, 180, 232, 0.6);
  margin-bottom:3.5rem;
}

.buttons { display:flex; gap:1.5rem; flex-wrap:wrap; justify-content:center; }

.btn {
  padding:1.2rem 2.8rem; /* Крупные кнопки */
  border-radius:40px; 
  border:1px solid rgba(214, 168, 241, 0.3);
  background:rgba(0,0,0,0.6); 
  color:#D6A8F1; 
  text-decoration:none; 
  transition:.3s;
  font-size: 1.4rem;
  font-weight: 500;
}
.btn:hover { background:#7A2E8E; color:#fff; border-color:#7A2E8E; transform: translateY(-3px); }

.btn.secondary { padding:0.9rem 2rem; font-size: 1.1rem; opacity: 0.9; }

footer { position:absolute; bottom:1rem; font-size:0.9rem; color:#888; letter-spacing: 1px; }

/* ==================== АДАПТАЦИЯ ДЛЯ ОБЫЧНЫХ МОНИТОРОВ И НОУТБУКОВ ==================== */
@media(max-width:1440px) {
  h1 { font-size: 5.5rem; }
  .subtitle { font-size: 2.5rem; }
  .top-tagline { font-size: 1.8rem; }
}

/* ==================== МОБИЛЬНАЯ ВЕРСИЯ ==================== */
@media(max-width:768px) {
  body { padding-bottom:10vh; }
  .top-tagline {
    top:3.5rem;
    width:calc(100% - 40px);
    font-size:1rem;
  }
  h1 { font-size: 10vw; letter-spacing: 1px; }
  .subtitle { font-size: 1.3rem; margin-bottom: 2rem; }
  .avatar-wrapper { width:150px; height:150px; }
  .btn { padding: 0.8rem 1.6rem; font-size: 1rem; }
}
</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="location.href='index_ru.html'">RU</button>
  <button onclick="location.href='index_jp.html'">JP</button>
</div>

<div class="top-tagline">
  SunDarknessShine is an artist working across tattoo, permanent makeup (PMU), and custom textile art, united by a single visual language.
</div>

<div class="content">
  <div class="avatar-wrapper">
    <img id="avatar" src="artist_photo.jpg" alt="Artist portrait">
  </div>

  <h1>SunDarknessShine</h1>
  <div class="subtitle">The official website of the artist</div>

  <div class="buttons" style="margin-bottom:1.5rem;">
    <a href="index1.html" class="btn">Custom</a>
    <a href="index2.html" class="btn">Tattoo</a>
    <a href="index3.html" class="btn">PMU</a>
  </div>

  <div class="buttons">
    <a href="about.html" class="btn secondary">About the Artist</a>
    <a href="contact.html" class="btn secondary">Contacts</a>
  </div>
</div>

<footer>© 2025 SunDarknessShine</footer>

<script>
  const avatar = document.getElementById("avatar");
  const photos = ["artist_photo.jpg", "artist_avatar.jpg"];
  let i = 0;

  setInterval(() => {
    i = (i + 1) % photos.length;
    avatar.style.opacity = 0;
    avatar.style.transform = "scale(0.97)";
    setTimeout(() => {
      avatar.src = photos[i];
      avatar.style.opacity = 1;
      avatar.style.transform = "scale(1)";
    }, 200);
  }, 2500);

  avatar.addEventListener("click", () => {
    i = (i + 1) % photos.length;
    avatar.src = photos[i];
  });
</script>

</body>
</html>
