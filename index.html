<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunDarknessShine</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000 url("background.jpg") no-repeat center center fixed;
  background-size:cover;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  position:relative;
  padding-bottom:10vh;
  overflow-x:hidden;
}

/* Верхняя надпись — нежно-сиреневая */
.top-tagline {
  position:absolute;
  top:1.35rem;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;                    /* просто и надёжно */
  max-width: 920px;
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.25rem;
  line-height: 1.48;
  color: #D8B4E8;
  text-shadow:
    -1.4px -1.4px 0 #000,
     1.4px -1.4px 0 #000,
    -1.4px  1.4px 0 #000,
     1.4px  1.4px 0 #000,
     0 0 20px rgba(216, 180, 232, 0.8);
  z-index: 2;
}

/* Главный заголовок */
h1 {
  font-family: 'Cinzel', serif;
  font-size: 3.25rem;
  color: #E2C275;
  text-shadow:
    -1.7px -1.7px 0 #000,
     1.7px -1.7px 0 #000,
    -1.7px  1.7px 0 #000,
     1.7px  1.7px 0 #000,
     0 0 30px rgba(226, 194, 117, 0.9);
  margin: 0.55rem 0 0.35rem;
  letter-spacing: 2px;
  text-align: center;
  padding: 0 20px;               /* защита от вылезания на узких экранах */
  max-width: 100%;
}

/* Подзаголовок */
.subtitle {
  font-size: 1.55rem;
  color: #D8B4E8;
  text-shadow:
    -1.5px -1.5px 0 #000,
     1.5px -1.5px 0 #000,
    -1.5px  1.5px 0 #000,
     1.5px  1.5px 0 #000,
     0 0 20px rgba(216, 180, 232, 0.75);
  margin-bottom: 2.1rem;
}

/* Кнопки языка — меньше и в угол */
.lang-switch {
  position:absolute;
  top:1.1rem;
  right:1.1rem;
  display:flex;
  gap:0.4rem;
  z-index:10;
}
.lang-switch button {
  background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.35);
  color:#fff;
  border-radius:5px;
  padding:0.25rem 0.6rem;
  font-size:0.84rem;
  cursor:pointer;
}
.lang-switch button:hover { background:rgba(255,255,255,.3); }

/* Остальные кнопки */
.buttons { 
  display:flex; 
  gap:1rem; 
  flex-wrap:wrap; 
  justify-content:center; 
}
.btn {
  padding:.8rem 1.6rem;
  border-radius:30px;
  border:1px solid #000;
  background:rgba(0,0,0,.45);
  color:#D6A8F1;
  text-decoration:none;
  transition:.3s;
}
.btn:hover {
  background:#7A2E8E;
  color:#fff;
  border-color:#7A2E8E;
}
.btn.secondary { padding:.65rem 1.25rem; }

.content { text-align:center; z-index:1; padding:1rem; }

.avatar-wrapper {
  width:190px;
  height:190px;
  margin:0 auto 1.2rem;
}
.avatar-wrapper img {
  width:100%; height:100%; object-fit:cover; border-radius:50%;
  border:4px solid #7A2E8E;
  box-shadow:0 0 25px rgba(0,0,0,.9), 0 0 30px rgba(122,46,142,.7);
  cursor:pointer;
  transition:opacity .4s ease, transform .4s ease;
}

footer {
  position:absolute;
  bottom:1rem;
  font-size:.85rem;
  color:#aaa;
}

/* ==================== МОБИЛЬНАЯ ВЕРСИЯ ==================== */
@media(max-width:768px) {
  .top-tagline {
    top:1.05rem;
    font-size:1.02rem;
    width: 88%;
    padding: 0 12px;
  }
  h1 {
    font-size: 2.22rem;
    letter-spacing: 1.4px;
    padding: 0 15px;
  }
  .subtitle {
    font-size: 1.12rem;
    margin-bottom:1.7rem;
  }
  .avatar-wrapper { width:150px; height:150px; }
}

/* ==================== БОЛЬШИЕ ЭКРАНЫ ==================== */
@media(min-width:1200px) {
  .top-tagline { font-size: 2.15rem; }
  h1 { 
    font-size: 4.75rem; 
    letter-spacing: 3.5px;
  }
  .subtitle { font-size: 2.15rem; }
  
  .btn {
    padding: 1rem 2rem;
    font-size: 1.15rem;
  }
}
</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="location.href='index_ru.html'">RU</button>
  <button onclick="location.href='index_jp.html'">JP</button>
</div>

<div class="top-tagline">
  SunDarknessShine is an artist working across tattoo, permanent makeup (PMU), and custom textile art, united by a single visual language and artistic vision.
</div>

<div class="content">
  <div class="avatar-wrapper">
    <img id="avatar" src="artist_photo.jpg" alt="Artist portrait">
  </div>

  <h1>SunDarknessShine</h1>
  <div class="subtitle">The official website of the artist</div>

  <div class="buttons" style="margin-bottom:1rem;">
    <a href="index1.html" class="btn">Custom</a>
    <a href="index2.html" class="btn">Tattoo</a>
    <a href="index3.html" class="btn">PMU</a>
  </div>

  <div class="buttons">
    <a href="about.html" class="btn secondary">About the Artist</a>
    <a href="contact.html" class="btn secondary">Contacts</a>
  </div>
</div>

<footer>© 2025 SunDarknessShine</footer>

<script>
  const avatar = document.getElementById("avatar");
  const photos = ["artist_photo.jpg", "artist_avatar.jpg"];
  let i = 0;

  setInterval(() => {
    i = (i + 1) % photos.length;
    avatar.style.opacity = 0;
    avatar.style.transform = "scale(0.97)";
    setTimeout(() => {
      avatar.src = photos[i];
      avatar.style.opacity = 1;
      avatar.style.transform = "scale(1)";
    }, 200);
  }, 2000);

  avatar.addEventListener("click", () => {
    i = (i + 1) % photos.length;
    avatar.src = photos[i];
  });
</script>

</body>
</html>
