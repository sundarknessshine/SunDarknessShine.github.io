<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunDarknessShine</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>
/* ============================================================
   ГЛОБАЛЬНОЕ МАСШТАБИРОВАНИЕ 
   Мы меняем размер шрифта у <html>, и всё, что написано в 'rem', 
   меняется автоматически по всей странице.
   ============================================================ */
html { font-size: 16px; } /* Базовый масштаб */

/* Для больших мониторов (фулл ШД и выше) увеличиваем масштаб всего сайта */
@media (min-width: 1440px) { html { font-size: 19px; } }
@media (min-width: 1920px) { html { font-size: 22px; } }
@media (min-width: 2560px) { html { font-size: 26px; } } /* Для 4K */

/* Для мобильных устройств уменьшаем базовый масштаб */
@media (max-width: 768px) { html { font-size: 14px; } }
@media (max-width: 480px) { html { font-size: 12px; } } /* Для самых маленьких телефонов */

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000 url("background.jpg") no-repeat center center fixed;
  background-size:cover;
  min-height:100vh;
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  position:relative;
  padding-bottom: 8vh; /* Отступ снизу в vh */
  overflow-x:hidden;
}

/* Переключатель языков — МАКСИМАЛЬНО в углу и маленький */
.lang-switch {
  position:absolute;
  top: 0.5rem; /* Очень маленький отступ */
  right: 0.5rem;
  display:flex;
  gap: 0.3rem; /* Тонкий промежуток */
  z-index:10;
}

.lang-switch button {
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  color:#aaa;
  border-radius:3px;
  padding: 0.2rem 0.4rem; /* Микро-кнопки */
  cursor:pointer;
  font-size: 0.7rem; /* Крошечный шрифт */
  transition: 0.3s;
}
.lang-switch button:hover { color:#fff; background:rgba(255,255,255,0.2); }

/* Слоган — ВСЕГДА ниже кнопок языков */
.top-tagline {
  position:absolute;
  top: 4rem; /* Большой отступ сверху, чтобы не пересекаться с языками на мобильных */
  left:50%;
  transform:translateX(-50%);
  width: min(60rem, 90%); /* 'Резиновый' контейнер */
  padding:0 1rem;
  text-align:center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(0.9rem, 4.5vw, 1.4rem); /* Адаптивный размер */
  line-height:1.45;
  color:#D8B4E8;
  text-shadow:
    -.1rem -.1rem 0 #000,
     .1rem -.1rem 0 #000,
    -.1rem  .1rem 0 #000,
     .1rem  .1rem 0 #000,
     0 0 1.25rem rgba(216, 180, 232, 0.7);
  z-index:2;
}

.content { text-align:center; z-index:1; padding:1rem; width:100%; }

/* Аватар */
.avatar-wrapper {
  width: 10rem; /* Размер в rem */
  height: 10rem;
  margin:0 auto 1.5rem;
}
.avatar-wrapper img {
  width:100%; height:100%; object-fit:cover; border-radius:50%;
  border:.25rem solid #7A2E8E;
  box-shadow:0 0 1.5rem rgba(0,0,0,0.8), 0 0 2rem rgba(122,46,142,0.5);
  transition: opacity 0.4s ease, transform 0.4s ease;
}

/* Главный заголовок (Проблемная зона) */
h1 {
  font-family: 'Cinzel', serif;
  /* Используем clamp, чтобы на мобильных заголовок не вылезал влево */
  font-size: clamp(1.8rem, 7vw, 4.5rem); 
  color:#E2C275;
  text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0 0 30px rgba(226, 194, 117, 0.6);
  margin-bottom: 0.3rem;
  letter-spacing: 2px;
  white-space: nowrap; /* Держим в одну строку на больших экранах */
}

/* Подзаголовок */
.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.6rem;
  color:#D8B4E8;
  text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
  margin-bottom: 2.5rem;
}

.buttons { display:flex; gap: 0.8rem; flex-wrap:wrap; justify-content:center; }

.btn {
  padding: 0.8rem 1.8rem; 
  border-radius: 2rem;
  border: 1px solid rgba(214, 168, 241, 0.2);
  background: rgba(0,0,0,0.5);
  color: #D6A8F1;
  text-decoration: none;
  font-size: 1rem;
  transition: 0.3s;
  display: inline-block;
}
.btn:hover { background:#7A2E8E; color:#fff; transform: translateY(-2px); }

.btn.secondary {
  padding: 0.6rem 1.4rem;
  font-size: 0.85rem;
}

footer { position:absolute; bottom:1rem; font-size: 0.75rem; color:#666; }

/* Специфические правки для очень узких экранов (телефонов) */
@media (max-width: 480px) {
  h1 { font-size: 8.5vw; white-space: normal; word-wrap: break-word; letter-spacing: 0.5px; }
  .top-tagline { top: 3.5rem; font-size: 1rem; width: 85%; }
  .avatar-wrapper { width: 8rem; height: 8rem; }
  .subtitle { margin-bottom: 2rem; }
  .btn { padding: 0.7rem 1.4rem; width: 80%; text-align: center; } /* Кнопки крупнее */
}

</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="location.href='index.html'">EN</button>
  <button onclick="location.href='index_jp.html'">JP</button>
</div>

<div class="top-tagline">
 SunDarknessShine — мультиформатная арт-студия, объединяющая татуировку, перманентный макияж и кастомную роспись ткани в единый визуальный стиль.
</div>

<div class="content">
  <div class="avatar-wrapper">
    <img id="avatar" src="artist_photo.jpg" alt="Фотография художницы">
  </div>

  <h1>SunDarknessShine</h1>
  <div class="subtitle">Официальный сайт художницы</div>

  <div class="buttons" style="margin-bottom: 1rem;">
    <a href="index1_ru.html" class="btn">Кастом</a>
    <a href="index2_ru.html" class="btn">Тату</a>
    <a href="index3_ru.html" class="btn">Перманент</a>
  </div>

  <div class="buttons">
    <a href="about_ru.html" class="btn secondary">О художнике</a>
    <a href="contact_ru.html" class="btn secondary">Контакты</a>
  </div>
</div>

<footer>© 2025 SunDarknessShine</footer>

<script>
  const avatar = document.getElementById("avatar");
  const photos = ["artist_photo.jpg", "artist_avatar.jpg"];
  let i = 0;

  setInterval(() => {
    i = (i + 1) % photos.length;
    avatar.style.opacity = 0;
    avatar.style.transform = "scale(0.98)";
    setTimeout(() => {
      avatar.src = photos[i];
      avatar.style.opacity = 1;
      avatar.style.transform = "scale(1)";
    }, 300);
  }, 3000);

  avatar.addEventListener("click", () => {
    i = (i + 1) % photos.length;
    avatar.src = photos[i];
  });
</script>

</body>
</html>
