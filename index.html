<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunDarknessShine</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000 url("background.jpg") no-repeat center center fixed;
  background-size:cover;
  min-height:100vh;
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  position:relative;
  padding-bottom:10vh;
  overflow-x:hidden;
}

.top-tagline {
  position:absolute;
  top:1.4rem;
  left:50%;
  transform:translateX(-50%);
  width:min(980px, calc(100% - 180px));
  padding:0 1rem;
  text-align:center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size:1.25rem;
  line-height:1.45;
  color:#D8B4E8;                    /* нежно-сиреневый */
  text-shadow:
    -1.5px -1.5px 0 #000,
     1.5px -1.5px 0 #000,
    -1.5px  1.5px 0 #000,
     1.5px  1.5px 0 #000,
     0 0 22px rgba(216, 180, 232, 0.85);
  z-index:2;
}

.lang-switch {
  position:absolute;
  top:1.5rem;
  right:1.5rem;
  display:flex;
  gap:.5rem;
  z-index:3;
}

.lang-switch button {
  background:rgba(255,255,255,.15);
  border:1px solid #ccc;
  color:#fff;
  border-radius:5px;
  padding:.3rem .6rem;
  cursor:pointer;
  font-size:.9rem;
  transition:.25s;
}
.lang-switch button:hover { background:rgba(255,255,255,.3); }

.content { text-align:center; z-index:1; padding:1rem; }

.avatar-wrapper {
  width:190px;
  height:190px;
  margin:0 auto 1.2rem;
}
.avatar-wrapper img {
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
  border:4px solid #7A2E8E;
  box-shadow:0 0 25px rgba(0,0,0,.9), 0 0 30px rgba(122,46,142,.7);
  cursor:pointer;
  transition:opacity .4s ease, transform .4s ease;
}

h1 {
  font-family: 'Cinzel', serif;
  font-size:3.2rem;
  color:#E2C275;                    /* золотистый */
  text-shadow:
    -1.6px -1.6px 0 #000,
     1.6px -1.6px 0 #000,
    -1.6px  1.6px 0 #000,
     1.6px  1.6px 0 #000,
     0 0 28px rgba(226, 194, 117, 0.9);
  margin-bottom:.35rem;
  letter-spacing: 2px;
}

.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size:1.55rem;
  letter-spacing:1px;
  color:#D8B4E8;                    /* нежно-сиреневый */
  text-shadow:
    -1.5px -1.5px 0 #000,
     1.5px -1.5px 0 #000,
    -1.5px  1.5px 0 #000,
     1.5px  1.5px 0 #000,
     0 0 22px rgba(216, 180, 232, 0.8);
  margin-bottom:2.1rem;
}

.buttons {
  display:flex;
  gap:1rem;
  flex-wrap:wrap;
  justify-content:center;
}

.btn {
  padding:.8rem 1.6rem;
  border-radius:30px;
  border:1px solid #000;
  background:rgba(0,0,0,.45);
  color:#D6A8F1;
  text-decoration:none;
  transition:.3s;
}
.btn:hover {
  background:#7A2E8E;
  color:#fff;
  border-color:#7A2E8E;
}
.btn.secondary {
  padding:.65rem 1.2rem;
}

footer {
  position:absolute;
  bottom:1rem;
  font-size:.85rem;
  color:#aaa;
}

/* ==================== МОБИЛЬНАЯ ВЕРСИЯ ==================== */
@media(max-width:768px) {
  body {
    background-attachment:scroll;
    background-size:contain;
    background-position:center 20%;
    background-repeat:no-repeat;
    background-color:#000;
    padding-bottom:8vh;
  }
  .top-tagline {
    top:1.1rem;
    width:calc(100% - 120px);
    font-size:0.98rem;
    line-height:1.42;
    padding:0 .8rem;
  }
  h1 { 
    font-size:2.15rem;
    letter-spacing: 1.6px;
  }
  .subtitle { 
    font-size:1.12rem;
    margin-bottom:1.65rem; 
  }
  .avatar-wrapper { width:150px; height:150px; }
}

/* ==================== БОЛЬШИЕ ЭКРАНЫ ==================== */
@media(min-width:1200px) {
  h1 { font-size:3.8rem; }
  .subtitle { font-size:1.75rem; }
  .top-tagline { font-size:1.38rem; }
}

</style>
</head>

<div class="lang-switch">

    <img id="avatar" src="artist_photo.jpg" alt="Artist portrait">

  <h1>SunDarknessShine</h1>
  <div class="subtitle">The official website of the artist</div>

  <div class="buttons" style="margin-bottom:1rem;">
    <a href="index1.html" class="btn">Custom</a>
    <a href="index2.html" class="btn">Tattoo</a>
    <a href="index3.html" class="btn">PMU</a>
  </div>

  <div class="buttons">
    <a href="about.html" class="btn secondary">About the Artist</a>
    <a href="contact.html" class="btn secondary">Contacts</a>
  </div>
</div>

<footer>© 2025 SunDarknessShine</footer>
