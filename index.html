<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunDarknessShine</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000 url("background.jpg") no-repeat center center fixed;
  background-size:cover;
  min-height:100vh;
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  position:relative;
  padding-bottom:9vh;
  overflow-x:hidden;
}

/* Верхний слоган */
.top-tagline {
  position:absolute;
  top:1.35rem;
  left:50%;
  transform:translateX(-50%);
  width:92%;                    /* меньше контейнер */
  max-width: 860px;
  padding:0 15px;
  text-align:center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size:1.22rem;
  line-height:1.45;
  color:#D8B4E8;
  text-shadow:
    -1.5px -1.5px 0 #000,
     1.5px -1.5px 0 #000,
    -1.5px  1.5px 0 #000,
     1.5px  1.5px 0 #000,
     0 0 22px rgba(216, 180, 232, 0.85);
  z-index:2;
}

/* Переключатель языков */
.lang-switch {
  position:absolute;
  top:1.1rem;
  right:1.1rem;
  display:flex;
  gap:.4rem;
  z-index:3;
}

.lang-switch button {
  background:rgba(255,255,255,.15);
  border:1px solid #ccc;
  color:#fff;
  border-radius:5px;
  padding:.25rem .58rem;
  cursor:pointer;
  font-size:0.84rem;
  transition:.25s;
}
.lang-switch button:hover { background:rgba(255,255,255,.3); }

.content { 
  text-align:center; 
  z-index:1; 
  padding:1rem 15px; 
  width: 100%;
}

/* Аватар */
.avatar-wrapper {
  width:178px;
  height:178px;
  margin:0 auto 1.1rem;
}
.avatar-wrapper img {
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
  border:4px solid #7A2E8E;
  box-shadow:0 0 25px rgba(0,0,0,.9), 0 0 30px rgba(122,46,142,.7);
  cursor:pointer;
  transition:opacity .4s ease, transform .4s ease;
}

/* Главный заголовок */
h1 {
  font-family: 'Cinzel', serif;
  font-size:3.15rem;
  color:#E2C275;
  text-shadow:
    -1.6px -1.6px 0 #000,
     1.6px -1.6px 0 #000,
    -1.6px  1.6px 0 #000,
     1.6px  1.6px 0 #000,
     0 0 28px rgba(226, 194, 117, 0.9);
  margin-bottom:.35rem;
  letter-spacing: 2px;
  padding: 0 20px;
}

/* Подзаголовок */
.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size:1.52rem;
  color:#D8B4E8;
  text-shadow:
    -1.5px -1.5px 0 #000,
     1.5px -1.5px 0 #000,
    -1.5px  1.5px 0 #000,
     1.5px  1.5px 0 #000,
     0 0 22px rgba(216, 180, 232, 0.8);
  margin-bottom:2rem;
}

.buttons {
  display:flex;
  gap:1rem;
  flex-wrap:wrap;
  justify-content:center;
}

.btn {
  padding:.78rem 1.55rem;
  border-radius:30px;
  border:1px solid #000;
  background:rgba(0,0,0,.45);
  color:#D6A8F1;
  text-decoration:none;
  transition:.3s;
}
.btn:hover {
  background:#7A2E8E;
  color:#fff;
  border-color:#7A2E8E;
}
.btn.secondary {
  padding:.62rem 1.15rem;
}

footer {
  position:absolute;
  bottom:1rem;
  font-size:.85rem;
  color:#aaa;
}

/* ==================== МОБИЛЬНАЯ ВЕРСИЯ — делаем компактнее ==================== */
@media(max-width:768px) {
  .top-tagline {
    top:1.05rem;
    width: 88%;                 /* ещё меньше контейнер */
    font-size: 0.97rem;
    padding: 0 12px;
  }
  h1 { 
    font-size: 2.05rem;         /* уменьшили, чтобы точно влазило */
    letter-spacing: 1.2px;
    padding: 0 18px;
  }
  .subtitle { 
    font-size: 1.08rem;
    margin-bottom:1.7rem; 
  }
  .avatar-wrapper { 
    width:148px; 
    height:148px; 
  }
  .btn {
    padding:.72rem 1.35rem;
    font-size:0.96rem;
  }
}

/* ==================== БОЛЬШИЕ ЭКРАНЫ ==================== */
@media(min-width:1200px) {
  .top-tagline { 
    font-size: 2.25rem; 
    top: 1.7rem;
  }
  h1 { 
    font-size: 4.1rem; 
    letter-spacing: 3.5px;
  }
  .subtitle { 
    font-size: 1.95rem; 
  }
  .avatar-wrapper { 
    width: 215px; 
    height: 215px; 
  }
  .btn {
    padding: 1rem 2.1rem;
    font-size: 1.14rem;
  }
}
</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="location.href='index_ru.html'">RU</button>
  <button onclick="location.href='index_jp.html'">JP</button>
</div>

<div class="top-tagline">
  SunDarknessShine is an artist working across tattoo, permanent makeup (PMU), and custom textile art, united by a single visual language and artistic vision.
</div>

<div class="content">
  <div class="avatar-wrapper">
    <img id="avatar" src="artist_photo.jpg" alt="Artist portrait">
  </div>

  <h1>SunDarknessShine</h1>
  <div class="subtitle">The official website of the artist</div>

  <div class="buttons" style="margin-bottom:1rem;">
    <a href="index1.html" class="btn">Custom</a>
    <a href="index2.html" class="btn">Tattoo</a>
    <a href="index3.html" class="btn">PMU</a>
  </div>

  <div class="buttons">
    <a href="about.html" class="btn secondary">About the Artist</a>
    <a href="contact.html" class="btn secondary">Contacts</a>
  </div>
</div>

<footer>© 2025 SunDarknessShine</footer>

<script>
  const avatar = document.getElementById("avatar");
  const photos = ["artist_photo.jpg", "artist_avatar.jpg"];
  let i = 0;

  setInterval(() => {
    i = (i + 1) % photos.length;
    avatar.style.opacity = 0;
    avatar.style.transform = "scale(0.97)";
    setTimeout(() => {
      avatar.src = photos[i];
      avatar.style.opacity = 1;
      avatar.style.transform = "scale(1)";
    }, 200);
  }, 2000);

  avatar.addEventListener("click", () => {
    i = (i + 1) % photos.length;
    avatar.src = photos[i];
  });
</script>

</body>
</html>
