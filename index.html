<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunDarknessShine</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>
/* ГЛОБАЛЬНОЕ МАСШТАБИРОВАНИЕ 
  Мы меняем размер шрифта у <html>, и всё, что написано в 'rem', 
  меняется автоматически по всей странице.
*/
html { font-size: 16px; }

/* Для Full HD мониторов (1920px и выше) увеличиваем масштаб всего сайта */
@media (min-width: 1900px) {
  html { font-size: 22px; } 
}

/* Для средних мониторов */
@media (min-width: 1200px) and (max-width: 1899px) {
  html { font-size: 18px; }
}

/* Для мобильных устройств уменьшаем базовый масштаб */
@media (max-width: 768px) {
  html { font-size: 14px; }
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000 url("background.jpg") no-repeat center center fixed;
  background-size:cover;
  min-height:100vh;
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  position:relative;
  padding-bottom: 8vh;
  overflow-x:hidden;
}

/* Переключатель языков — МАКСИМАЛЬНО в углу и маленький */
.lang-switch {
  position:absolute;
  top: 0.5rem;
  right: 0.5rem;
  display:flex;
  gap: 0.3rem;
  z-index:10;
}

.lang-switch button {
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  color:#999;
  border-radius:3px;
  padding: 0.2rem 0.4rem;
  cursor:pointer;
  font-size: 0.7rem;
  transition: 0.3s;
}
.lang-switch button:hover { color:#fff; background:rgba(255,255,255,0.2); }

/* Слоган — ВСЕГДА ниже кнопок языков */
.top-tagline {
  position:absolute;
  top: 3.5rem; /* Отступ сверху, чтобы не пересекаться с языками */
  left:50%;
  transform:translateX(-50%);
  width: min(1100px, 90%);
  text-align:center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.4rem; /* Размер будет зависеть от масштаба html */
  line-height:1.4;
  color:#D8B4E8;
  text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 0 20px rgba(216, 180, 232, 0.5);
  z-index:2;
}

.content { text-align:center; z-index:1; padding:1rem; width:100%; }

.avatar-wrapper {
  width: 10rem;
  height: 10rem;
  margin:0 auto 1.5rem;
}
.avatar-wrapper img {
  width:100%; height:100%; object-fit:cover; border-radius:50%;
  border:3px solid #7A2E8E;
  box-shadow:0 0 20px rgba(0,0,0,0.8), 0 0 30px rgba(122,46,142,0.5);
  transition: opacity 0.4s ease, transform 0.4s ease;
}

h1 {
  font-family: 'Cinzel', serif;
  /* Используем clamp, чтобы на мобильных заголовок не вылезал влево */
  font-size: clamp(1.8rem, 7vw, 4.5rem); 
  color:#E2C275;
  text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0 0 30px rgba(226, 194, 117, 0.6);
  margin-bottom: 0.3rem;
  letter-spacing: 2px;
  white-space: nowrap; /* Держим в одну строку на больших экранах */
}

.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.6rem;
  color:#D8B4E8;
  text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
  margin-bottom: 2.5rem;
}

/* КНОПКИ — Вернули оригинальные пропорции, но в rem */
.buttons { display:flex; gap: 0.8rem; flex-wrap:wrap; justify-content:center; }

.btn {
  padding: 0.8rem 1.8rem; 
  border-radius: 2rem;
  border: 1px solid rgba(214, 168, 241, 0.2);
  background: rgba(0,0,0,0.5);
  color: #D6A8F1;
  text-decoration: none;
  font-size: 1rem;
  transition: 0.3s;
  display: inline-block;
}
.btn:hover { background:#7A2E8E; color:#fff; transform: translateY(-2px); }

.btn.secondary {
  padding: 0.6rem 1.4rem;
  font-size: 0.85rem;
}

footer { position:absolute; bottom:1rem; font-size: 0.75rem; color:#666; }

/* Специфические правки для очень узких экранов (телефонов) */
@media (max-width: 480px) {
  h1 { font-size: 8.5vw; white-space: normal; word-wrap: break-word; }
  .top-tagline { top: 3rem; font-size: 1rem; width: 85%; }
  .btn { padding: 0.7rem 1.4rem; width: 80%; text-align: center; } /* Кнопки на мобильном в столбик или крупнее */
}

</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="location.href='index_ru.html'">RU</button>
  <button onclick="location.href='index_jp.html'">JP</button>
</div>

<div class="top-tagline">
  SunDarknessShine is an artist working across tattoo, permanent makeup (PMU), and custom textile art, united by a single visual language.
</div>

<div class="content">
  <div class="avatar-wrapper">
    <img id="avatar" src="artist_photo.jpg" alt="Artist portrait">
  </div>

  <h1>SunDarknessShine</h1>
  <div class="subtitle">The official website of the artist</div>

  <div class="buttons" style="margin-bottom: 1rem;">
    <a href="index1.html" class="btn">Custom</a>
    <a href="index2.html" class="btn">Tattoo</a>
    <a href="index3.html" class="btn">PMU</a>
  </div>

  <div class="buttons">
    <a href="about.html" class="btn secondary">About the Artist</a>
    <a href="contact.html" class="btn secondary">Contacts</a>
  </div>
</div>

<footer>© 2025 SunDarknessShine</footer>

<script>
  const avatar = document.getElementById("avatar");
  const photos = ["artist_photo.jpg", "artist_avatar.jpg"];
  let i = 0;

  setInterval(() => {
    i = (i + 1) % photos.length;
    avatar.style.opacity = 0;
    avatar.style.transform = "scale(0.98)";
    setTimeout(() => {
      avatar.src = photos[i];
      avatar.style.opacity = 1;
      avatar.style.transform = "scale(1)";
    }, 300);
  }, 3000);

  avatar.addEventListener("click", () => {
    i = (i + 1) % photos.length;
    avatar.src = photos[i];
  });
</script>

</body>
</html>
