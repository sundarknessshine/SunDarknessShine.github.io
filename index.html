<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunDarknessShine</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000 url("background.jpg") no-repeat center center fixed;
  background-size:cover;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  position:relative;
  padding-bottom:11vh;
  overflow-x:hidden;
}

/* Верхняя надпись — теперь золотистая */
.top-tagline {
  position:absolute;
  top:1.4rem;
  left:50%;
  transform:translateX(-50%);
  width: min(1100px, 92%);           /* резиново */
  max-width: 92%;
  padding: 0 1.2rem;
  text-align:center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.32rem;
  line-height: 1.5;
  color: #E2C275;                     /* золотистый, как заголовок */
  text-shadow:
    -1.5px -1.5px 0 #000,
     1.5px -1.5px 0 #000,
    -1.5px  1.5px 0 #000,
     1.5px  1.5px 0 #000,
     0 0 24px rgba(226, 194, 117, 0.85);
  z-index:2;
}

/* Главный заголовок */
h1 {
  font-family: 'Cinzel', serif;
  font-size: 3.4rem;
  color: #E2C275;
  text-shadow:
    -1.8px -1.8px 0 #000,
     1.8px -1.8px 0 #000,
    -1.8px  1.8px 0 #000,
     1.8px  1.8px 0 #000,
     0 0 32px rgba(226, 194, 117, 0.9);
  margin: 0.6rem 0 0.4rem;
  letter-spacing: 2.5px;
  max-width: 100%;
  padding: 0 15px;                    /* защита от вылезания */
  text-align: center;
}

/* Подзаголовок */
.subtitle {
  font-size: 1.6rem;
  color: #D8B4E8;
  text-shadow:
    -1.5px -1.5px 0 #000,
     1.5px -1.5px 0 #000,
    -1.5px  1.5px 0 #000,
     1.5px  1.5px 0 #000,
     0 0 22px rgba(216, 180, 232, 0.78);
  margin-bottom: 2.2rem;
}

/* Кнопки языка — меньше и дальше в угол */
.lang-switch {
  position:absolute;
  top:1.2rem;
  right:1.2rem;
  display:flex;
  gap:.4rem;
  z-index:10;
}
.lang-switch button {
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.4);
  color:#fff;
  border-radius:6px;
  padding:.28rem .65rem;
  cursor:pointer;
  font-size:0.86rem;
  transition:.25s;
}
.lang-switch button:hover {
  background:rgba(255,255,255,.28);
}

/* Кнопки меню */
.buttons {
  display:flex;
  gap:1rem;
  flex-wrap:wrap;
  justify-content:center;
}
.btn {
  padding:.85rem 1.75rem;
  border-radius:30px;
  border:1px solid #000;
  background:rgba(0,0,0,.45);
  color:#D6A8F1;
  text-decoration:none;
  transition:.3s;
  font-size:1.05rem;
}
.btn:hover {
  background:#7A2E8E;
  color:#fff;
  border-color:#7A2E8E;
}
.btn.secondary {
  padding:.7rem 1.35rem;
}

/* ==================== МОБИЛЬНАЯ ВЕРСИЯ ==================== */
@media (max-width: 768px) {
  .top-tagline {
    top: 1.05rem;
    font-size: 1.05rem;
    width: 90%;
    padding: 0 1rem;
  }

  h1 {
    font-size: 2.28rem;
    letter-spacing: 1.6px;
    padding: 0 12px;
  }

  .subtitle {
    font-size: 1.14rem;
    margin-bottom: 1.8rem;
  }

  .avatar-wrapper {
    width: 148px;
    height: 148px;
  }

  .btn {
    padding: .72rem 1.4rem;
    font-size: 0.97rem;
  }
}

/* ==================== БОЛЬШИЕ ЭКРАНЫ ==================== */
@media (min-width: 1200px) {
  .top-tagline {
    font-size: 2.35rem;
  }
  h1 {
    font-size: 5.0rem;
    letter-spacing: 4px;
  }
  .subtitle {
    font-size: 2.25rem;
  }

  .btn {
    padding: 1.1rem 2.3rem;
    font-size: 1.2rem;
  }
  .btn.secondary {
    padding: .9rem 1.7rem;
  }
}

.content { text-align:center; z-index:1; padding:1rem; }

.avatar-wrapper {
  width:195px;
  height:195px;
  margin:0 auto 1.3rem;
}
.avatar-wrapper img {
  width:100%; height:100%; object-fit:cover; border-radius:50%;
  border:4px solid #7A2E8E;
  box-shadow:0 0 28px rgba(0,0,0,.9), 0 0 35px rgba(122,46,142,.75);
  cursor:pointer;
  transition:opacity .4s ease, transform .4s ease;
}

footer {
  position:absolute;
  bottom:1.2rem;
  font-size:.86rem;
  color:#aaa;
}
</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="location.href='index_ru.html'">RU</button>
  <button onclick="location.href='index_jp.html'">JP</button>
</div>

<div class="top-tagline">
  SunDarknessShine is an artist working across tattoo, permanent makeup (PMU), and custom textile art, united by a single visual language and artistic vision.
</div>

<div class="content">
  <div class="avatar-wrapper">
    <img id="avatar" src="artist_photo.jpg" alt="Artist portrait">
  </div>

  <h1>SunDarknessShine</h1>
  <div class="subtitle">The official website of the artist</div>

  <div class="buttons" style="margin-bottom:1rem;">
    <a href="index1.html" class="btn">Custom</a>
    <a href="index2.html" class="btn">Tattoo</a>
    <a href="index3.html" class="btn">PMU</a>
  </div>

  <div class="buttons">
    <a href="about.html" class="btn secondary">About the Artist</a>
    <a href="contact.html" class="btn secondary">Contacts</a>
  </div>
</div>

<footer>© 2025 SunDarknessShine</footer>

<script>
  const avatar = document.getElementById("avatar");
  const photos = ["artist_photo.jpg", "artist_avatar.jpg"];
  let i = 0;

  setInterval(() => {
    i = (i + 1) % photos.length;
    avatar.style.opacity = 0;
    avatar.style.transform = "scale(0.97)";
    setTimeout(() => {
      avatar.src = photos[i];
      avatar.style.opacity = 1;
      avatar.style.transform = "scale(1)";
    }, 200);
  }, 2000);

  avatar.addEventListener("click", () => {
    i = (i + 1) % photos.length;
    avatar.src = photos[i];
  });
</script>

</body>
</html>
