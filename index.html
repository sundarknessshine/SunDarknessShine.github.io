<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunDarknessShine</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000 url("background.jpg") no-repeat center center fixed;
  background-size:cover;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  position:relative;
  padding-bottom:12vh;
  overflow-x:hidden;
}

/* Верхнее описание */
.top-tagline {
  position:absolute;
  top:1.6rem;
  left:50%;
  transform:translateX(-50%);
  width:min(1200px, calc(100% - 60px));
  padding:0 1.5rem;
  text-align:center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size:1.42rem;
  line-height:1.55;
  color:#D8B4E8;
  text-shadow:
    -1.6px -1.6px 0 #000,
     1.6px -1.6px 0 #000,
    -1.6px  1.6px 0 #000,
     1.6px  1.6px 0 #000,
     0 0 24px rgba(216, 180, 232, 0.78);
  z-index:2;
}

/* Главный заголовок */
h1 {
  font-family: 'Cinzel', serif;
  font-size: 3.6rem;
  color: #E2C275;
  text-shadow:
    -1.8px -1.8px 0 #000,
     1.8px -1.8px 0 #000,
    -1.8px  1.8px 0 #000,
     1.8px  1.8px 0 #000,
     0 0 32px rgba(226, 194, 117, 0.9);
  margin: 0.7rem 0 0.5rem;
  letter-spacing: 3px;
  max-width: 100%;
  text-align: center;
}

/* Подзаголовок */
.subtitle {
  font-size: 1.75rem;
  color: #D8B4E8;
  text-shadow:
    -1.5px -1.5px 0 #000,
     1.5px -1.5px 0 #000,
    -1.5px  1.5px 0 #000,
     1.5px  1.5px 0 #000,
     0 0 24px rgba(216, 180, 232, 0.75);
  margin-bottom: 2.4rem;
}

/* ==================== МОБИЛЬНАЯ ВЕРСИЯ ==================== */
@media (max-width: 768px) {
  .top-tagline {
    top: 1.05rem;
    width: 94%;
    font-size: 1.05rem;
    line-height: 1.45;
  }

  h1 {
    font-size: 2.35rem;           /* уменьшено, чтобы точно влазило */
    letter-spacing: 1.8px;
    max-width: 100%;              /* на весь экран */
    white-space: normal;          /* разрешаем перенос, если очень длинно */
    padding: 0 10px;
  }

  .subtitle {
    font-size: 1.12rem;
    margin-bottom: 1.8rem;
  }

  .avatar-wrapper {
    width: 152px;
    height: 152px;
  }

  /* Кнопки на мобильных — чуть меньше */
  .btn {
    padding: .75rem 1.4rem;
    font-size: 1rem;
  }
}

/* ==================== БОЛЬШИЕ ЭКРАНЫ (ПК) ==================== */
@media (min-width: 1200px) {
  .top-tagline {
    font-size: 2.35rem;           /* сильно увеличено */
    line-height: 1.58;
  }
  h1 {
    font-size: 5.1rem;            /* сильно увеличено */
    letter-spacing: 4px;
  }
  .subtitle {
    font-size: 2.35rem;           /* сильно увеличено */
  }

  /* Кнопки крупнее на ПК */
  .btn {
    padding: 1.05rem 2.1rem;
    font-size: 1.15rem;
  }
  .btn.secondary {
    padding: .85rem 1.6rem;
  }
}

/* Общие стили кнопок */
.lang-switch {
  position: absolute;
  top: 1.6rem;
  right: 1.6rem;
  display: flex;
  gap: .5rem;
  z-index: 3;
}
.lang-switch button {
  background: rgba(255,255,255,.15);
  border: 1px solid #ccc;
  color: #fff;
  border-radius: 5px;
  padding: .38rem .8rem;
  cursor: pointer;
  font-size: .93rem;
}
.lang-switch button:hover { background: rgba(255,255,255,.32); }

.content { text-align: center; z-index: 1; padding: 1rem; }

.avatar-wrapper {
  width: 200px;
  height: 200px;
  margin: 0 auto 1.4rem;
}
.avatar-wrapper img {
  width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
  border: 4px solid #7A2E8E;
  box-shadow: 0 0 28px rgba(0,0,0,.9), 0 0 38px rgba(122,46,142,.78);
  cursor: pointer;
  transition: opacity .4s ease, transform .4s ease;
}

.buttons {
  display: flex;
  gap: 1.2rem;
  flex-wrap: wrap;
  justify-content: center;
}
.btn {
  padding: .9rem 1.85rem;
  border-radius: 30px;
  border: 1px solid #000;
  background: rgba(0,0,0,.45);
  color: #D6A8F1;
  text-decoration: none;
  transition: .3s;
  font-size: 1.05rem;
}
.btn:hover {
  background: #7A2E8E;
  color: #fff;
  border-color: #7A2E8E;
}
.btn.secondary { padding: .72rem 1.4rem; }

footer {
  position: absolute;
  bottom: 1.3rem;
  font-size: .87rem;
  color: #aaa;
}
</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="location.href='index_ru.html'">RU</button>
  <button onclick="location.href='index_jp.html'">JP</button>
</div>

<div class="top-tagline">
  SunDarknessShine is an artist working across tattoo, permanent makeup (PMU), and custom textile art, united by a single visual language and artistic vision.
</div>

<div class="content">
  <div class="avatar-wrapper">
    <img id="avatar" src="artist_photo.jpg" alt="Artist portrait">
  </div>

  <h1>SunDarknessShine</h1>
  <div class="subtitle">The official website of the artist</div>

  <div class="buttons" style="margin-bottom:1rem;">
    <a href="index1.html" class="btn">Custom</a>
    <a href="index2.html" class="btn">Tattoo</a>
    <a href="index3.html" class="btn">PMU</a>
  </div>

  <div class="buttons">
    <a href="about.html" class="btn secondary">About the Artist</a>
    <a href="contact.html" class="btn secondary">Contacts</a>
  </div>
</div>

<footer>© 2025 SunDarknessShine</footer>

<script>
  const avatar = document.getElementById("avatar");
  const photos = ["artist_photo.jpg", "artist_avatar.jpg"];
  let i = 0;

  setInterval(() => {
    i = (i + 1) % photos.length;
    avatar.style.opacity = 0;
    avatar.style.transform = "scale(0.97)";
    setTimeout(() => {
      avatar.src = photos[i];
      avatar.style.opacity = 1;
      avatar.style.transform = "scale(1)";
    }, 200);
  }, 2000);

  avatar.addEventListener("click", () => {
    i = (i + 1) % photos.length;
    avatar.src = photos[i];
  });
</script>

</body>
</html>
