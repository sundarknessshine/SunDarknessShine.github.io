<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunDarknessShine</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000 url("background.jpg") no-repeat center center fixed;
  background-size:cover;
  min-height:100vh;
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  position:relative;
  padding-bottom:10vh;
  overflow-x:hidden; /* Предотвращает горизонтальную прокрутку */
}

/* Верхний слоган */
.top-tagline {
  position:absolute;
  top:1.4rem;
  left:50%;
  transform:translateX(-50%);
  width:min(980px, calc(100% - 40px)); /* Увеличили ширину на малых экранах */
  padding:0 1rem;
  text-align:center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(0.9rem, 4vw, 1.25rem); /* Адаптивный размер */
  line-height:1.45;
  color:#D8B4E8;
  text-shadow:
    -1.5px -1.5px 0 #000,
     1.5px -1.5px 0 #000,
    -1.5px  1.5px 0 #000,
     1.5px  1.5px 0 #000,
     0 0 22px rgba(216, 180, 232, 0.85);
  z-index:2;
}

/* Переключатель языков */
.lang-switch {
  position:absolute;
  top:1.5rem;
  right:1rem;
  display:flex;
  gap:.5rem;
  z-index:3;
}

.lang-switch button {
  background:rgba(255,255,255,.15);
  border:1px solid #ccc;
  color:#fff;
  border-radius:5px;
  padding:.3rem .6rem;
  cursor:pointer;
  font-size:.8rem;
  transition:.25s;
}
.lang-switch button:hover { background:rgba(255,255,255,.3); }

.content { 
  text-align:center; 
  z-index:1; 
  padding:1rem; 
  width: 100%; 
  max-width: 600px;
}

/* Аватар */
.avatar-wrapper {
  width:clamp(140px, 25vw, 190px); /* Адаптивный размер круга */
  height:clamp(140px, 25vw, 190px);
  margin:0 auto 1.2rem;
}
.avatar-wrapper img {
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
  border:4px solid #7A2E8E;
  box-shadow:0 0 25px rgba(0,0,0,.9), 0 0 30px rgba(122,46,142,.7);
  cursor:pointer;
  transition:opacity .4s ease, transform .4s ease;
}

/* Главный заголовок (Проблемная зона) */
h1 {
  font-family: 'Cinzel', serif;
  /* Шрифт плавно уменьшается от 3.2rem до 1.7rem в зависимости от ширины экрана */
  font-size: clamp(1.7rem, 8vw, 3.2rem); 
  color:#E2C275;
  text-shadow:
    -1.6px -1.6px 0 #000,
     1.6px -1.6px 0 #000,
    -1.6px  1.6px 0 #000,
     1.6px  1.6px 0 #000,
     0 0 28px rgba(226, 194, 117, 0.9);
  margin-bottom:.35rem;
  letter-spacing: 2px;
  word-wrap: break-word; /* Страховка от вылезания текста */
}

/* Подзаголовок */
.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(1.1rem, 5vw, 1.55rem);
  letter-spacing:1px;
  color:#D8B4E8;
  text-shadow:
    -1.5px -1.5px 0 #000,
     1.5px -1.5px 0 #000,
    -1.5px  1.5px 0 #000,
     1.5px  1.5px 0 #000,
     0 0 22px rgba(216, 180, 232, 0.8);
  margin-bottom:2.1rem;
}

.buttons {
  display:flex;
  gap:0.8rem;
  flex-wrap:wrap;
  justify-content:center;
}

.btn {
  padding:.8rem 1.6rem;
  border-radius:30px;
  border:1px solid #000;
  background:rgba(0,0,0,.45);
  color:#D6A8F1;
  text-decoration:none;
  transition:.3s;
  font-size: 0.95rem;
}
.btn:hover {
  background:#7A2E8E;
  color:#fff;
  border-color:#7A2E8E;
}
.btn.secondary {
  padding:.65rem 1.2rem;
  font-size: 0.85rem;
}

footer {
  position:absolute;
  bottom:1rem;
  font-size:.85rem;
  color:#aaa;
}

/* Настройки для мобильных устройств */
@media(max-width:768px) {
  body {
    background-attachment:scroll;
    background-size:contain;
    background-position:center 20%;
    background-repeat:no-repeat;
    background-color:#000;
    padding-bottom:8vh;
  }
  
  h1 { 
    letter-spacing: 0.5px; /* Уменьшаем интервал, чтобы слово влезло */
  }

  .lang-switch {
    top: 0.8rem;
    right: 0.8rem;
  }
}

</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="location.href='index_ru.html'">RU</button>
  <button onclick="location.href='index_jp.html'">JP</button>
</div>

<div class="top-tagline">
  SunDarknessShine is an artist working across tattoo, permanent makeup (PMU), and custom textile art, united by a single visual language and artistic vision.
</div>

<div class="content">
  <div class="avatar-wrapper">
    <img id="avatar" src="artist_photo.jpg" alt="Artist portrait">
  </div>

  <h1>SunDarknessShine</h1>
  <div class="subtitle">The official website of the artist</div>

  <div class="buttons" style="margin-bottom:1rem;">
    <a href="index1.html" class="btn">Custom</a>
    <a href="index2.html" class="btn">Tattoo</a>
    <a href="index3.html" class="btn">PMU</a>
  </div>

  <div class="buttons">
    <a href="about.html" class="btn secondary">About the Artist</a>
    <a href="contact.html" class="btn secondary">Contacts</a>
  </div>
</div>

<footer>© 2025 SunDarknessShine</footer>

<script>
  const avatar = document.getElementById("avatar");
  const photos = ["artist_photo.jpg", "artist_avatar.jpg"];
  let i = 0;

  // Исправленный и завершенный скрипт анимации
  setInterval(() => {
    i = (i + 1) % photos.length;
    avatar.style.opacity = 0;
    avatar.style.transform = "scale(0.97)";
    setTimeout(() => {
      avatar.src = photos[i];
      avatar.style.opacity = 1;
      avatar.style.transform = "scale(1)";
    }, 200);
  }, 2000);

  avatar.addEventListener("click", () => {
    i = (i + 1) % photos.length;
    avatar.src = photos[i];
  });
</script>

</body>
</html>
