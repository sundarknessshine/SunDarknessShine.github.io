<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:#000 url("background2.jpg") no-repeat center center fixed;
  background-size:cover;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  overflow-x:hidden;
  padding-bottom:4rem;
}

/* 言語スイッチャー */
.lang-switch {
  position:fixed;
  top:1.3rem;
  right:1.3rem;
  display:flex;
  gap:.5rem;
  z-index:50;
}
.lang-switch button {
  background:rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,.7);
  color:#fff;
  border-radius:6px;
  padding:.35rem .8rem;
  cursor:pointer;
  font-size:.9rem;
}

/* メインタイトル Custom */
h1 {
  margin:3rem 0 1.8rem;
  font-family:'Cinzel', serif;
  font-size:3.1rem;
  color:#E2C275;
  text-shadow:
    -2px -2px 0 #000,
     2px -2px 0 #000,
    -2px  2px 0 #000,
     2px  2px 0 #000,
     0 0 30px rgba(226,194,117,.85);
  letter-spacing:3px;
}

/* サブタイトル Information — 大きくした */
h2 {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 2.35rem;        /* ← 希望通り大きく */
  color:#D8B4E8;
  margin:2.2rem 0 1.4rem;
  text-shadow:
    -1.5px -1.5px 0 #000,
     1.5px -1.5px 0 #000,
    -1.5px  1.5px 0 #000,
     1.5px  1.5px 0 #000,
     0 0 28px rgba(216,180,232,.8);
  text-align:center;
}

/* 本文 */
p, li {
  font-size:1.45rem;
  line-height:1.85;
  margin-bottom:1.1rem;
  color:#D8B4E8;
  text-shadow:
    -1.5px -1.5px 0 #000,
     1.5px -1.5px 0 #000,
    -1.5px  1.5px 0 #000,
     1.5px  1.5px 0 #000,
     0 0 20px rgba(0,0,0,.85);
}

.block {
  max-width:1000px;
  margin:0 auto 2rem;
  text-align:left;
  padding:0 1rem;
}

a { color:#D8B4E8; text-decoration:underline; }
a:hover { color:#fff; }

/* 戻るボタン */
.back {
  display:inline-block;
  margin-top:2rem;
  padding:.8rem 2rem;
  border-radius:30px;
  border:1px solid rgba(216,180,232,.6);
  background:rgba(0,0,0,.45);
  color:#D8B4E8;
  text-decoration:none;
  font-size:1.05rem;
  transition:.3s;
}
.back:hover {
  background:#7A2E8E;
  color:#fff;
  border-color:#7A2E8E;
}

/* レスポンシブ */
@media(max-width:768px) {
  h1 { font-size:2.4rem; }
  h2 { font-size:2.0rem; }
  p, li { font-size:1.25rem; line-height:1.7; }
}
</style>
</head>
