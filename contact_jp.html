<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>連絡先 – SunDarknessShine</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:#000 url("background2.jpg") no-repeat center center fixed;
  background-size:cover;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  overflow-x:hidden;
  padding:2rem 1rem 4rem;
}

/* 言語スイッチャー */
.lang-switch {
  position:fixed;
  top:1.3rem;
  right:1.3rem;
  display:flex;
  gap:.5rem;
  z-index:50;
}
.lang-switch button {
  background:rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,.7);
  color:#fff;
  border-radius:6px;
  padding:.35rem .8rem;
  cursor:pointer;
  font-size:.9rem;
}

/* メインタイトル */
h1 {
  margin:3rem 0 2rem;
  font-family:'Cinzel', serif;
  font-size:3.1rem;
  color:#E2C275;
  text-shadow:
    -2px -2px 0 #000,
     2px -2px 0 #000,
    -2px  2px 0 #000,
     2px  2px 0 #000,
     0 0 30px rgba(226,194,117,.85);
  letter-spacing:3px;
}

/* グリッド */
.grid {
  width:100%;
  max-width:980px;
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
  gap:18px;
  margin-bottom:2rem;
}

.card {
  background:rgba(0,0,0,.55);
  border-radius:14px;
  padding:16px;
  text-align:center;
  transition:.3s;
  border:1px solid rgba(216,180,232,.2);
}
.card:hover {
  transform:translateY(-8px);
  box-shadow:0 15px 35px rgba(0,0,0,.7);
  border-color:rgba(216,180,232,.5);
}

.card img {
  width:100%;
  height:220px;
  object-fit:contain;
  border-radius:10px;
  background:rgba(255,255,255,.05);
  margin-bottom:12px;
}

.card .link {
  display:block;
  padding:12px 16px;
  border-radius:30px;
  text-decoration:none;
  color:#D8B4E8;
  border:1px solid rgba(216,180,232,.6);
  background:rgba(0,0,0,.45);
  font-size:1.05rem;
  transition:.3s;
}
.card .link:hover {
  background:#7A2E8E;
  color:#fff;
  border-color:#7A2E8E;
}

/* 戻るボタン */
.back {
  display:inline-block;
  margin-top:1rem;
  padding:.8rem 2rem;
  border-radius:30px;
  border:1px solid rgba(216,180,232,.6);
  background:rgba(0,0,0,.45);
  color:#D8B4E8;
  text-decoration:none;
  font-size:1.05rem;
  transition:.3s;
}
.back:hover {
  background:#7A2E8E;
  color:#fff;
  border-color:#7A2E8E;
}
</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="location.href='contact.html'">EN</button>
  <button onclick="location.href='contact_ru.html'">RU</button>
</div>

<h1>連絡先</h1>

<div class="grid">
  <div class="card">
    <a class="link" href="https://www.instagram.com/7sunshine8" target="_blank">Instagram @7sunshine8</a>
    <a href="https://www.instagram.com/7sunshine8" target="_blank"><img src="instagram.jpg" alt="Instagram"></a>
  </div>

  <div class="card">
    <a class="link" href="https://line.me/ti/p/Z98vMmhwl-" target="_blank">LINE オープン</a>
    <a href="https://line.me/ti/p/Z98vMmhwl-" target="_blank"><img src="line.jpg" alt="LINE"></a>
  </div>

  <div class="card">
    <a class="link" href="https://wa.me/qr/GIOBZKEOQOSPC1" target="_blank">WhatsApp オープン</a>
    <a href="https://wa.me/qr/GIOBZKEOQOSPC1" target="_blank"><img src="watsapp.jpg" alt="WhatsApp"></a>
  </div>
</div>

<a href="index_jp.html" class="back">← メインに戻る</a>

</body>
</html>
